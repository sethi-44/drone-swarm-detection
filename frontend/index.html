<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL-4</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="crt"></div>
<div id="vignette"></div>
<canvas id="grain"></canvas>
<div id="screen">
    <div id="main">
        <div id="scope"><canvas id="radar"></canvas></div>
        <div id="data"><pre id="readout"></pre></div>
    </div>
    <div id="bar">
        <select id="scn"><option value="large_swarm">SCN:LRG_SWM</option><option value="small_swarm">SCN:SML_SWM</option><option value="single">SCN:SINGLE</option></select>
        <span id="mode">MODE:RUN</span>
        <span id="tickd">TICK:----</span>
        <span id="clock">00:00:00</span>
        <span id="conn">● OFFLINE</span>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
